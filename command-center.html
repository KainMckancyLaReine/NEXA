<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>/* auth guard — no dashboard without login */try{if(!localStorage.getItem('nexa_user'))location.replace('signin.html');}catch(e){}</script>
<title>NEXA — Command Center</title>
<link rel="icon" href="assets/img/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="assets/js/preload.js"></script>
<link rel="stylesheet" href="assets/css/nexa.css" />
<style>
body { height: 100vh; overflow: hidden; }
.app { display: grid; grid-template-columns: 252px 1fr; height: 100vh; }
@media (max-width: 1000px){ .app { grid-template-columns: 76px 1fr; } }
/* NOTE: mobile/responsive rules live in one authoritative block at the
   bottom of this stylesheet so they win the cascade (see "MOBILE" below). */

/* Sidebar */
.side { border-right: 1px solid var(--border); padding: 22px 16px; display: flex; flex-direction: column; gap: 4px; background: var(--surface); overflow-y: auto; }
.side .brand { padding: 4px 8px 18px; }
.side .grp-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em; color: var(--text-3); padding: 16px 12px 6px; }
.nav-i { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 11px; color: var(--text-2); font-size: 14px; cursor: pointer; transition: .18s; font-weight: 500; text-decoration: none; }
.nav-i:hover { background: rgba(15,23,42,0.04); color: var(--text); }
.nav-i.active { background: linear-gradient(100deg, rgba(59,130,246,0.2), rgba(37,99,235,0.06)); color: var(--accent-2); box-shadow: inset 0 0 0 1px rgba(59,130,246,0.25); }
.nav-i .ic { width: 18px; height: 18px; flex: none; display: grid; place-items: center; color: var(--text-3); transition: color .18s; }
.nav-i .ic svg { width: 18px; height: 18px; display: block; }
.nav-i:hover .ic { color: var(--text); }
.nav-i.active .ic { color: var(--accent-2); }
.nav-i .badge { margin-left: auto; font-size: 11px; background: var(--accent); color:#fff; padding: 1px 7px; border-radius: 999px; }
.side .user { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
.side .user .av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--sunset)); display: grid; place-items: center; font-size: 12px; font-weight: 700; }
.side .user .logout { margin-left:auto; width:30px; height:30px; border-radius:9px; display:grid; place-items:center; color:var(--text-2); border:1px solid var(--border); font-size:15px; text-decoration:none; transition:.2s; }
.side .user .logout:hover { color:var(--error); border-color:rgba(220,38,38,0.4); background:rgba(220,38,38,0.06); }
@media (max-width: 1000px){ .nav-i span:not(.ic):not(.badge), .grp-label, .side .brand span:last-child, .side .user div { display: none; } .side { align-items: center; } .nav-i { justify-content: center; } }

/* Center column */
.center-col { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
.cmdbar { padding: 16px 26px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.72); backdrop-filter: blur(10px); flex: none; }
.cmd-input { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); transition: border-color .2s, box-shadow .2s; }
.cmd-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59,130,246,0.12); }
.cmd-input .pre { color: var(--sunset); font-weight: 700; }
.cmd-input input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; }
.cmd-input input::placeholder { color: var(--text-3); }
.cmd-input .send { background: linear-gradient(135deg,var(--accent),#2563EB); color:#fff; border:none; border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.cmd-input .mic { width:40px; height:40px; border-radius:10px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:16px; display:grid; place-items:center; transition:.2s; flex:none; }
.cmd-input .mic:hover { border-color:var(--ink); }
.cmd-input .mic.rec { background:#EF4444; color:#fff; border-color:#EF4444; animation:pulse 1.1s infinite; }
.cmd-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cmd-head .hi { font-size:14px; color:var(--text-2); }
.cmd-head .hi b { color:var(--ink); }
.suggestions { display: flex; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
.suggestion { font-size: 12.5px; color: var(--text-2); padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border); background: rgba(15,23,42,0.02); cursor: pointer; transition: .2s; }
.suggestion:hover { border-color: var(--accent); color: var(--accent-2); }

.view-scroll { flex: 1; overflow-y: auto; padding: 24px 26px; }
.view-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.view-head h2 { font-size: 22px; letter-spacing: -.03em; } .view-head p { color: var(--text-3); font-size: 13.5px; margin-top: 4px; }

/* Dashboard */
.dash { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: start; }
@media (max-width: 1100px){ .dash { grid-template-columns: 1fr; } }
.metrics-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; }
@media (max-width: 900px){ .metrics-row { grid-template-columns: repeat(2,1fr); } }
.metric { padding: 18px; } .metric .v { font-size: 25px; font-weight: 800; letter-spacing: -.03em; } .metric .k { font-size: 12px; color: var(--text-3); margin-top: 4px; } .metric .d { font-size: 12px; margin-top: 6px; } .metric .d.up { color: var(--success); }
.feed-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.feed-title h3 { font-size: 16px; } .feed-title .live-tag { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-2); }
.activity { display: flex; flex-direction: column; gap: 10px; }
.act { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); }
.act .av { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,var(--accent),#1e40af); display: grid; place-items: center; font-size: 12px; font-weight: 700; flex: none; color:#fff; text-decoration:none; }
.act .txt { flex: 1; min-width: 0; } .act .txt .who { font-weight: 600; font-size: 14px; text-decoration:none; } .act .txt .what { color: var(--text-2); font-size: 13.5px; }
.act .time { color: var(--text-3); font-size: 12px; white-space: nowrap; }
.act .tag { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-2); }
.act .tag.exec { color: var(--success); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }

.intel { padding: 4px 0; }
.intel h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--text-3); margin: 18px 0 12px; } .intel h4:first-child { margin-top: 0; }
.ibox { padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); margin-bottom: 12px; }
.ibox .top { display: flex; justify-content: space-between; align-items: baseline; } .ibox .lbl { font-size: 12.5px; color: var(--text-2); } .ibox .big { font-size: 20px; font-weight: 800; letter-spacing: -.03em; margin-top: 6px; }
.pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; } .pill.good { color: var(--success); background: rgba(34,197,94,0.1); } .pill.warn { color: var(--warm); background: rgba(245,158,11,0.12); } .pill.bad { color: var(--error); background: rgba(239,68,68,0.1); }
.rec { display: flex; gap: 10px; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; background: rgba(59,130,246,0.05); } .rec .ai { color: var(--sunset); font-size: 12px; font-weight: 700; flex: none; } .rec .body { font-size: 13px; color: var(--text-2); }
.perfbar { height: 6px; border-radius: 6px; background: #DBE4F0; overflow: hidden; margin-top: 8px; } .perfbar i { display: block; height: 100%; background: linear-gradient(90deg,var(--accent),var(--sunset)); }

/* Generic cards grid */
.cards { display: grid; gap: 16px; }
.g3 { grid-template-columns: repeat(3,1fr); } .g4 { grid-template-columns: repeat(4,1fr); }
@media (max-width: 1100px){ .g4 { grid-template-columns: repeat(2,1fr); } .g3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 640px){ .g3,.g4 { grid-template-columns: 1fr; } }

/* Workforce cards */
.wf-card { padding: 22px; transition: transform .3s, border-color .3s; }
.wf-card:hover { transform: translateY(-4px); border-color: var(--border-strong); }
.wf-card .top { display: flex; align-items: center; gap: 13px; }
.wf-card .av { width: 46px; height: 46px; border-radius: 13px; background: linear-gradient(135deg,var(--accent),#1e40af); display: grid; place-items: center; font-weight: 700; box-shadow: 0 0 22px -8px var(--accent-glow); color:#fff; }
.wf-card .nm { font-weight: 700; font-size: 15.5px; } .wf-card .dp { font-size: 12px; color: var(--sunset); }
.wf-card .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0 14px; }
.wf-card .m { padding: 11px; border-radius: 11px; background: rgba(15,23,42,0.025); border: 1px solid var(--border); } .wf-card .m .v { font-size: 17px; font-weight: 700; } .wf-card .m .k { font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; }
.wf-card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.wf-card .foot a { font-size: 13px; color: var(--accent-2); } .wf-card .foot a:hover { color: var(--text); }

/* Operations board */
.ops-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; } @media(max-width:900px){.ops-stats{grid-template-columns:repeat(2,1fr);}}
.ops-stat { padding: 16px; } .ops-stat .v { font-size: 22px; font-weight: 800; } .ops-stat .k { font-size: 12px; color: var(--text-3); margin-top: 3px; }
.board { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; } @media(max-width:800px){.board{grid-template-columns:1fr;}}
.col { padding: 16px; min-height: 200px; }
.col h4 { font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; } .col h4 .ct { margin-left: auto; font-size: 11px; color: var(--text-3); background: rgba(15,23,42,0.05); padding: 1px 8px; border-radius: 999px; }
.task { padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15,23,42,0.02); margin-bottom: 10px; font-size: 13px; }
.task .who { font-size: 11px; color: var(--accent-2); font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.task.exec { border-color: rgba(245,158,11,0.3); } .task.done { border-color: rgba(34,197,94,0.25); opacity: .85; }

/* Integrations */
.cat-row { margin-bottom: 26px; } .cat-row .cat-label { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; color: var(--text-3); margin-bottom: 12px; }
.int-card { padding: 18px; display: flex; align-items: center; gap: 14px; }
.int-card .lg { width: 42px; height: 42px; border-radius: 11px; display: grid; place-items: center; font-weight: 700; font-size: 15px; background: #fff; border: 1px solid var(--border); flex: none; }
.int-card .nm { font-weight: 600; font-size: 14.5px; } .int-card .st { font-size: 12px; margin-top: 2px; }
.int-card .st.on { color: var(--success); } .int-card .st.off { color: var(--text-3); }
.int-toggle { margin-left: auto; padding: 7px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-strong); background: #fff; color: var(--text); font-family: inherit; transition: .2s; }
.int-toggle.on { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); color: var(--success); }

/* Reports */
.rep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; } @media(max-width:900px){.rep-grid{grid-template-columns:1fr;}}
.chart-card { padding: 20px; } .chart-card h4 { font-size: 14px; margin-bottom: 4px; } .chart-card .sub { font-size: 12px; color: var(--text-3); margin-bottom: 14px; }
.rep-list .rep { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; background: var(--card); }
.rep .ric { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; background: rgba(59,130,246,0.12); color: var(--accent-2); font-size: 15px; flex: none; }
.rep .nm { font-weight: 600; font-size: 14px; } .rep .meta { font-size: 12px; color: var(--text-3); }
.rep .gen { margin-left: auto; padding: 8px 16px; border-radius: 10px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: none; background: linear-gradient(135deg,var(--accent),#2563EB); color: #fff; font-family: inherit; }
.recent-list .r { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--text-2); } .recent-list .r:last-child { border: none; }

/* Toast */
.toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0; background: var(--card); border: 1px solid var(--accent); border-radius: 14px; padding: 13px 20px; font-size: 13.5px; box-shadow: var(--shadow-soft); z-index: 100; transition: .3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); } .toast b { color: var(--sunset); }

/* ============================================================
   MOBILE — authoritative responsive rules (placed last so they
   win the cascade over the desktop sidebar/grid rules above)
   ============================================================ */
/* tablet: collapse sidebar to an icon rail (phones handled below) */
@media (min-width:681px) and (max-width:1000px){
  .app { grid-template-columns: 76px 1fr; }
  .nav-i span:not(.ic):not(.badge), .grp-label, .side .brand span:last-child, .side .user div { display: none; }
  .side { align-items: center; } .nav-i { justify-content: center; }
}

@media (max-width:680px){
  html, body { height: auto; overflow: auto; }
  .app { display: block; height: auto; min-height: 100vh; }

  /* sidebar -> sticky horizontal tab bar (icon + label, swipeable) */
  .side {
    display: flex; flex-direction: row; align-items: center; gap: 6px;
    height: auto; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch;
    border-right: none; border-bottom: 1px solid var(--border); padding: 8px 12px;
    position: sticky; top: 0; z-index: 50; background: var(--surface); scrollbar-width: none;
  }
  .side::-webkit-scrollbar { display: none; }
  .side .brand, .side .grp-label, .side .user { display: none; }
  .side .nav-i { flex: 0 0 auto; justify-content: flex-start; gap: 9px; padding: 8px 13px; white-space: nowrap; font-size: 13.5px; }
  .side .nav-i span:not(.ic):not(.badge) { display: inline; }
  .side .nav-i .badge { margin-left: 6px; }

  /* center column flows naturally; command bar not sticky to avoid overlap */
  .center-col { height: auto; display: block; }
  .cmdbar { padding: 14px 15px; position: static; background: var(--surface); }
  .cmd-head { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .cmd-head .hi { font-size: 13px; }
  .cmd-input { padding: 10px 12px; gap: 8px; }
  .cmd-input input { font-size: 14px; min-width: 0; }
  .cmd-input .send { padding: 9px 14px; }
  .cmd-input .mic { width: 38px; height: 38px; }
  .suggestions { margin-top: 9px; }

  .view-scroll { height: auto; overflow: visible; padding: 18px 15px 44px; }
  .dash { grid-template-columns: 1fr; }
  .metrics-row { grid-template-columns: 1fr 1fr; gap: 12px; }
  .view-head h2 { font-size: 19px; }
  .metric { padding: 15px; } .metric .v { font-size: 22px; }
  .wf-card { padding: 18px; }
  .act { padding: 12px 13px; gap: 11px; }
  .act .time { display: none; }
}

@media (max-width:430px){
  .metrics-row, .ops-stats { grid-template-columns: 1fr 1fr; gap: 10px; }
  .view-scroll { padding: 14px 12px 38px; }
  .cmd-input { flex-wrap: wrap; }
  .cmd-input input { flex: 1 1 100%; order: -1; padding: 2px 0 6px; }
  .cmd-input .send { flex: 1; }
  .cmd-input .mic { order: 1; }
  .cmd-head .hi { width: 100%; }
}
</style>
</head>
<body>
<div class="ambient"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <a class="brand" href="index.html"><span class="logo"></span> <span>NEXA</span></a>
    <a class="nav-i active" data-view="dashboard" href="#dashboard"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg></span><span data-i18n="cc.dashboard">Command Center</span></a>

    <a class="nav-i" data-view="approvals" href="#approvals"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span><span data-i18n="cc.approvals">Approvals</span><span class="badge" id="apBadge" style="display:none">0</span></a>
    <a class="nav-i" data-view="audit" href="#audit"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></span><span data-i18n="cc.audit">Audit log</span></a>
    <div class="grp-label">Configure</div>

    <a class="nav-i" data-view="reports" href="#reports"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="20" x2="21" y2="20"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="9"/><line x1="18" y1="20" x2="18" y2="5"/></svg></span><span data-i18n="cc.reports">Reports</span></a>
    <a class="nav-i" data-view="documents" href="#documents"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg></span><span data-i18n="cc.documents">Documents</span></a>
    <a class="nav-i" href="marketplace.html"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span><span data-i18n="cc.marketplace">Marketplace</span></a>
    <div class="user"><span class="av">K</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">Kain</div><div style="font-size:11px;color:var(--text-3)">Admin · Acme Inc.</div></div><a class="logout" href="signin.html" title="Sign out" onclick="try{localStorage.removeItem('nexa_user');localStorage.removeItem('nexa_token');}catch(e){}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div>
  </aside>

  <!-- CENTER -->

/* ---------- shared data / fallbacks ---------- */
const EMP = { OM:['E','Emma'], SM:['L','Liam'], FM:['S','Sophie'], SA:['N','Noah'], RA:['M','Maya'], DA:['L','Lucas'], MM:['O','Olivia'], PM:['D','Daniel'], DOC:['A','Ava'] };
const WF_FALLBACK = [
  {id:'OM',code:'OM',name:'AI Operations Manager',dept:'Operations',status:'live',tasksToday:112,timeSavedToday:6.4,performance:99},
  {id:'SM',code:'SM',name:'AI Sales Manager',dept:'Sales',status:'live',tasksToday:64,timeSavedToday:4.1,performance:97},

/* ============================================================
   UNIFIED TASK ENGINE
   Uses the live server when online; otherwise a localStorage-backed
   client engine so approvals/audit/autonomy work in file:// demos too.
   ============================================================ */
const ENG = (function(){
  const LS='nexa_cc_v1';
  function base(){ return { tasks:[], audit:[], autonomy:{OM:'supervised',SM:'supervised',FM:'supervised',SA:'auto',RA:'supervised',DOC:'supervised',DA:'auto',MM:'supervised',PM:'supervised'}, tseq:1, aseq:1 }; }
  let st; try{ st=JSON.parse(localStorage.getItem(LS))||base(); }catch(e){ st=base(); }
  function save(){ try{ localStorage.setItem(LS,JSON.stringify(st)); }catch(e){} }
  const NM = ()=>window.AINAMES||{};
  function route(t){ t=t.toLowerCase();
    if(/excel|spreadsheet|powerpoint|\bdeck\b|slides|presentation|word doc|\.xlsx|\.docx|\.pptx|generate (a |the )?(report|document|deck|model)|build (a |the )?(report|deck|model|workbook)/.test(t)) return 'DOC';
    if(/invoice|payment|finance|cashflow|overdue|reminder|expense|billing/.test(t)) return 'FM';
    if(/ticket|support|customer|csat|escalat/.test(t)) return 'SA';
    if(/lead|follow.?up|prospect|outreach|deal|pipeline|proposal/.test(t)) return 'SM';
    if(/candidate|recruit|interview|applicant|hire/.test(t)) return 'RA';
    return 'OM'; }
  function docType(t){ t=(t||'').toLowerCase(); if(/excel|spreadsheet|\.xlsx|workbook|model|cashflow|financial|budget/.test(t))return'xlsx'; if(/powerpoint|\bdeck\b|slides|presentation|\.pptx|pitch/.test(t))return'pptx'; return'docx'; }
  function docDesc(dt){ const m={xlsx:'Financial-Model',docx:'Business-Report',pptx:'Pitch-Deck'}; const d=new Date().toISOString().slice(0,10); return {type:dt,filename:'NEXA-'+(m[dt]||'Document')+'-'+d+'.'+dt}; }
  function steps(emp,t){ switch(emp){
    case 'DOC':{ const dt=docType(t); const k=dt==='xlsx'?'Excel workbook':dt==='pptx'?'PowerPoint deck':'Word document'; return ['pulled the latest figures from connected systems','drafted and formatted the '+k,'generated the file','shared it with the team']; }
    case 'FM': return ['reviewed overdue invoices','sent payment reminders','flagged 1 account for escalation','updated cashflow forecast'];
    case 'SM': return ['identified matching leads','sent personalized follow-ups','updated CRM · stage Re-engaged','scheduled follow-up sequence'];
    case 'SA': return ['triaged the open ticket queue','resolved tickets autonomously','updated knowledge base','escalated 1 ticket to human review'];
    case 'RA': return ['screened applications','shortlisted candidates','scheduled interview slots','sent follow-up emails'];
    default:   return ['parsed the request and gathered context','executed: "'+t+'"','updated CRM and internal docs','notified management with a summary']; } }
  function aud(type,empId,summary){ st.audit.unshift({id:'aud_'+(st.aseq++),ts:Date.now(),empId,empCode:empId,type,summary}); if(st.audit.length>200)st.audit.length=200; }
  function exec(task){ task.steps=steps(task.empId,task.text); task.status='done'; task.resolvedAt=Date.now(); if(task.empId==='DOC')task.document=docDesc(docType(task.text)); aud('execute',task.empId,'executed: "'+task.text+'"'); }
  return {
    online(){ return !!(window.NEXA && NEXA.online); },
    async submit(text){
      if(this.online()){ const r=await NEXA.submitTask(text); if(r) return r; }
      const emp=route(text), mode=st.autonomy[emp]||'supervised';
      const task={id:'task_'+(st.tseq++),empId:emp,empCode:emp,empName:NM()[emp]||emp,text,steps:[],status:mode==='auto'?'executing':'pending_approval',mode,createdAt:Date.now(),resolvedAt:null,document:null};
      st.tasks.unshift(task); aud('command',emp,'received command: "'+text+'"'); if(mode==='auto')exec(task); save();
      return {task,executed:mode==='auto',actions:[]};
    },
    async list(status){ if(this.online()){ const r=await NEXA.tasks(status); if(r) return r; } let t=st.tasks; if(status)t=t.filter(x=>x.status===status); return {tasks:t,pending:st.tasks.filter(x=>x.status==='pending_approval').length}; },
    async approve(id){ if(this.online()){ const r=await NEXA.approveTask(id); if(r) return r; } const t=st.tasks.find(x=>x.id===id); if(t&&t.status==='pending_approval'){t.status='executing';exec(t);aud('approve',t.empId,'approved & executed: "'+t.text+'"');save();} return {task:t}; },
    async reject(id){ if(this.online()){ const r=await NEXA.rejectTask(id); if(r) return r; } const t=st.tasks.find(x=>x.id===id); if(t){t.status='rejected';t.resolvedAt=Date.now();aud('reject',t.empId,'rejected: "'+t.text+'"');save();} return {task:t}; },
    async auditLog(){ if(this.online()){ const r=await NEXA.audit(); if(r&&r.audit) return r.audit; } return st.audit; },
    async pending(){ const r=await this.list('pending_approval'); return r.pending||0; },
    autonomyOf(id){ return st.autonomy[id]||'supervised'; },
    async setAutonomy(id,level){ if(this.online()) await NEXA.setAutonomy(id,level); st.autonomy[id]=level; save(); aud('autonomy',id,'autonomy set to '+level); },
    async roi(){ if(this.online()){ const r=await NEXA.roi(); if(r) return r; }
      const wf=window.__wf||WF_FALLBACK; const hours=+wf.reduce((s,e)=>s+(e.timeSavedToday||0),0).toFixed(1); const seats=wf.length;
      const daily=Math.round(hours*45), annual=daily*260, cost=seats*499, roi=cost?Math.round((annual/12-cost)/cost*100):0;
      return {hoursSavedToday:hours,annualSavings:annual,monthlyCost:cost,roiPct:roi,seats,avgPerformance:98,tasksToday:wf.reduce((s,e)=>s+(e.tasksToday||0),0)}; },
  };
})();

async function updateApBadge(){ try{ const n=await ENG.pending(); const b=$('#apBadge'); if(b){ b.textContent=n; b.style.display=n?'inline-block':'none'; } }catch(e){} }

async function runCommand(text){
  $('#cmd').value='';
  const r=await ENG.submit(text); const task=(r&&r.task)||{}; const emp=task.empId||'OM';
  const nm=(window.AINAMES&&AINAMES[emp])||task.empName||emp;
  if(r&&r.executed){
    if(ENG.online()){ toast(`<b>${nm}</b> — "${text}" ✓`); }
    else if(currentView==='dashboard'){
      addActivity(emp,'received command: "'+text+'"','command','just now');
      (task.steps&&task.steps.length?task.steps:['executed: "'+text+'"']).forEach(s=>addActivity(emp,s,'exec','just now'));
      const first=view.querySelector('.activity .act'); if(first) gsap.fromTo(first,{boxShadow:'0 0 0 2px rgba(37,99,235,0.6)'},{boxShadow:'0 0 0 0 transparent',duration:1.2});
    } else { toast(`<b>${nm}</b> — "${text}" ✓`); }
  } else {
    toast(`<b>${nm}</b> ${t('ap.sent')}`);
    updateApBadge();
    if(currentView==='approvals') renderApprovals();
  }
}

    card.querySelector('.ap-no').onclick=async()=>{ await ENG.reject(id); gsap.to(card,{opacity:0,y:-8,duration:.3,onComplete:renderApprovals}); };
  });
  updateApBadge();

  if(prepend){ actEl.insertBefore(node, actEl.firstChild); gsap.from(node,{opacity:0,y:-12,duration:.4}); } else actEl.appendChild(node);

const OPS_SEED = [
  ['OM','Compile Q2 operations summary'],['SM','Re-engage 38 inactive leads'],['FM','Reconcile June bank statement'],
  ['SA','Resolve ticket queue (tier 1)'],['RA','Screen 14 new applications'],['SM','Prepare Northwind proposal'],

  view.innerHTML = `
    <div class="view-head"><div><h2>Operations</h2><p>Live execution pipeline across the workforce</p></div></div>
    <div class="ops-stats">
      <div class="ops-stat glass"><div class="v" style="color:var(--sunset)" id="opThru">0</div><div class="k">Tasks / hour</div></div>
      <div class="ops-stat glass"><div class="v">1.4m</div><div class="k">Avg handle time</div></div>
      <div class="ops-stat glass"><div class="v" style="color:var(--success)">99.2%</div><div class="k">SLA met</div></div>

    </div>
    <div class="board">
      <div class="col glass"><h4>◷ Queued <span class="ct" id="cQ">0</span></h4><div id="colQ"></div></div>
      <div class="col glass"><h4><span class="status-dot busy"></span> Executing <span class="ct" id="cE">0</span></h4><div id="colE"></div></div>
      <div class="col glass"><h4><span class="status-dot live"></span> Completed <span class="ct" id="cD">0</span></h4><div id="colD"></div></div>
    </div>`;
  countTo('#opThru', 42, '');
  let doneCount = 0; const elDone=view.querySelector('#opDone'); elDone.textContent='128';
  const colQ=view.querySelector('#colQ'), colE=view.querySelector('#colE'), colD=view.querySelector('#colD');
  const recount=()=>{ view.querySelector('#cQ').textContent=colQ.children.length; view.querySelector('#cE').textContent=colE.children.length; view.querySelector('#cD').textContent=colD.children.length; };
  function card(emp, txt, cls){ const d=document.createElement('div'); d.className='task '+(cls||''); d.innerHTML=`<div class="who"><span class="status-dot ${cls==='done'?'live':cls==='exec'?'busy':'idle'}"></span>${(EMP[emp]||[emp,emp])[1]}</div>${txt}`; return d; }
  // seed columns
  OPS_SEED.slice(0,4).forEach(t => colQ.appendChild(card(t[0],t[1])));
  OPS_SEED.slice(4,6).forEach(t => colE.appendChild(card(t[0],t[1],'exec')));
  OPS_SEED.slice(6,9).forEach(t => colD.appendChild(card(t[0],t[1],'done')));
  recount();
  let idx = 0;
  // flow: pull a queued task -> executing -> done
  every(() => {
    // move oldest executing to done
    if(colE.firstChild){ const n=colE.firstChild; n.className='task done'; n.querySelector('.status-dot').className='status-dot live'; colD.insertBefore(n, colD.firstChild); doneCount++; elDone.textContent=128+doneCount; while(colD.children.length>5) colD.lastChild.remove(); }
    // move a queued to executing
    if(colQ.firstChild){ const n=colQ.firstChild; n.className='task exec'; n.querySelector('.status-dot').className='status-dot busy'; colE.appendChild(n); }
    // add a fresh queued
    const t = OPS_SEED[idx % OPS_SEED.length]; idx++; const fresh=card(t[0], t[1]); fresh.style.opacity=0; colQ.appendChild(fresh); gsap.to(fresh,{opacity:1,duration:.4});
    recount();
  }, 2600);
}

function barChart(data, color){
  const w=300,h=120,max=Math.max(...data),bw=w/data.length;
  const bars=data.map((v,i)=>{const bh=(v/max)*(h-20);return `<rect x="${i*bw+6}" y="${h-bh}" width="${bw-12}" height="${bh}" rx="4" fill="${color}" opacity="${0.5+0.5*v/max}"/>`;}).join('');
  const labels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].slice(0,data.length).map((l,i)=>`<text x="${i*bw+bw/2}" y="${h-2}" fill="#6B6B73" font-size="9" text-anchor="middle">${l}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">${bars}${labels}</svg>`;
}
function lineChart(data, color){
  const w=300,h=120,max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>[i*(w/(data.length-1)),h-18-((v-min)/(max-min||1))*(h-30)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=path+` L ${w} ${h-18} L 0 ${h-18} Z`;
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="${color}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%"><defs><linearGradient id="lg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#lg)"/><path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>${dots}</svg>`;
}

function downloadBlob(blob, filename){
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}
function genDocument(type){
  const date=new Date().toISOString().slice(0,10);
  try {

    }
